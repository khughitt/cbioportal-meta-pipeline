#
# PoC end-to-end run (t100) — first `results/` artifact from the post-t081
# annotated pipeline. Deliberately small + diverse to stress-test the
# hypermutator-annotation arc (t092-t099):
#
#   - ucec_tcga  : POLE hypermutator (~7% expected) + GMM bimodality stress
#   - skcm_tcga  : UV ultramutator stress (Campbell 100 mut/Mb)
#   - brca_tcga  : low-TMB control
#   - msk_impact_2017 : panel + tumor-only CH leakage stress
#
# Panel-version drift (t070):
#   - msk_impact_2017 mixes MSK-IMPACT-341 / 410 per-sample; t070
#     (panel-version drift per sample) IS APPLIED via `panel_bearing_studies`.
#     Panel ids are resolved per-sample from data_gene_panel_matrix.txt;
#     each sample's TMB denominator uses the correct panel-callable-Mb override.
#

# input / output directories
data_dir: "/data/raw/cbioportal"
out_dir: "results/poc-2026-04-17"

# minimum ratio of studies a gene must be present in to be included
filtering:
  genes:
    min_studies_ratio: 0.2

subsampling:
  patients: 1.0

summary:
  table_max_rows: 50
  min_gene_coverage_ratio: 0.4
  min_gene_coverage_ratio_specific: 0.1
  num_cancer_specific_results: 10

# Matched-normal studies — consumed by annotate_ch.py to stratify the
# Bolton 2020 7-gene CH-priority ratio into matched vs unmatched means.
# All 3 TCGA studies here use paired buffy-coat normals by design; MSK-IMPACT
# is tumor-only panel sequencing (Cheng 2015 + subsequent releases).
matched_normal_studies:
  - ucec_tcga_pan_can_atlas_2018
  - skcm_tcga_pan_can_atlas_2018
  - brca_tcga_pan_can_atlas_2018

# COSMIC Cancer Gene Census snapshot.
cosmic_cgc_path: "/data/raw/cosmic/v100/Cosmic_CancerGeneCensus_v100_GRCh38.tsv"

# Studies whose per-sample panel id is resolved from data_gene_panel_matrix.txt
# (t070 panel-version drift). These bypass the per-study `study_panel_map` lookup
# and use the per-sample panel callable-Mb value from `panel_callable_mb_override`.
panel_bearing_studies:
  - msk_impact_2017

# After t070, study_panel_map is a fallback for studies WITHOUT a per-sample
# data_gene_panel_matrix.txt (e.g., older pre-panel-matrix studies). Studies in
# `panel_bearing_studies` use per-sample panel resolution via the matrix file
# instead.
study_panel_map: {}

# Published MSK-IMPACT callable-Mb values (AGENTS.md template; Cheng 2015 /
# Zehir 2017 / subsequent IMPACT release notes). Included for forward-
# compatibility: once `study_panel_map` is populated, these become active.
panel_callable_mb_override:
  MSK-IMPACT-341: 0.89
  MSK-IMPACT-410: 1.01
  MSK-IMPACT-468: 1.22
  MSK-IMPACT-505: 1.45

wes_default_callable_mb: 30.0
panel_callable_mb_tolerance: 0.05

random_seed: 0
gmm_min_samples: 100

# Composite hypermutator floor (t105). Applied to BOTH the cancer type's GMM
# upper-component mean AND the sample's own TMB before promoting via row 4
# of the annotate_hypermutators decision table. Default 10 mut/Mb (Campbell
# 2017 hypermutator threshold). Lower values let the GMM signal dominate
# more (useful for low-TMB cancers where the upper mode is biologically real
# below 10); higher values make composite stricter / closer to Campbell-ultra.
composite_min_absolute_tmb: 10.0

# Clustering hyperparameters — consumed by cluster_genes.py and
# cluster_cancer_types.py. Required by both scripts; not present in any
# shipped config prior to this PoC, so the rules never previously ran
# end-to-end. Defaults chosen for a first PoC run; tune once results
# stabilize.
clustering:
  gene:
    k: 10
    gene_min_mutations: 10
    cancer_min_mutations: 5
    random_seed: 0
  cancer:
    k: 5
    gene_min_mutations: 10
    cancer_min_mutations: 5
    random_seed: 0

studies:
  - ucec_tcga_pan_can_atlas_2018
  - skcm_tcga_pan_can_atlas_2018
  - brca_tcga_pan_can_atlas_2018
  - msk_impact_2017

