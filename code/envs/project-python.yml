# Shared Python environment for Snakemake `script:` rules in code/workflows/Snakefile.
# The project normally runs through `uv run`; this conda file documents equivalent
# rule-level runtime requirements for Snakemake's integrated package-management mode.
channels:
  - conda-forge
dependencies:
  - python>=3.13
  - numpy
  - openpyxl
  - pandas
  - pyarrow
  - scikit-learn
  - scipy
  - seaborn
  - snakemake
  - curl
  - coreutils
  - file
  - grep
  - pip
  - pip:
      - sigprofilerassignment>=1.1.3
      - sigprofilermatrixgenerator>=1.3.6
